<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movies | compassplate</title>
    <link rel="icon" type="image/gif" href="/compass.gif">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background-color: black;
        color: white;
        padding: 20px;
    }

    .anchor-logo {
        position: fixed;
        top: 20px;
        right: 20px;
        height: 50px;
        width: 50px;
        z-index: 100;
    }

    button.back {
        position: fixed;
        top: 20px;
        left: 20px;
        background: none;
        border: 2px solid white;
        color: white;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 1em;
        border-radius: 5px;
        z-index: 100;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding-top: 80px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5em;
    }

    .search-box {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 40px;
    }

    .search-box input {
        width: 400px;
        padding: 12px 15px;
        border: 2px solid white;
        border-radius: 5px;
        background-color: #1a1a1a;
        color: white;
        font-size: 1em;
    }

    .search-box input::placeholder {
        color: #888;
    }

    .search-box button {
        position: static;
        padding: 12px 25px;
        margin: 0;
        background: none;
    }

    .movies-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
        margin-top: 60px;
    }

    .movie-card {
        cursor: pointer;
        transition: transform 0.3s;
        text-align: center;
    }

    .movie-card:hover {
        transform: scale(1.05);
    }

    .movie-poster {
        width: 100%;
        height: 280px;
        background-color: #333;
        border: 2px solid white;
        border-radius: 5px;
        object-fit: cover;
        margin-bottom: 10px;
    }

    .movie-title {
        font-size: 0.95em;
        white-space: normal;
    }

    .movie-year {
        font-size: 0.85em;
        color: #aaa;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 200;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        overflow-y: auto;
    }

    .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .modal-content {
        background-color: #1a1a1a;
        padding: 40px;
        border: 2px solid white;
        width: 90%;
        max-width: 700px;
        border-radius: 5px;
        max-height: 90vh;
        overflow-y: auto;
    }

    .close-modal {
        color: white;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .close-modal:hover {
        color: #aaa;
    }

    .movie-details {
        display: flex;
        gap: 30px;
    }

    .movie-details img {
        width: 200px;
        min-width: 200px;
        height: auto;
        border-radius: 5px;
    }

    .movie-info {
        flex: 1;
    }

    .movie-details h2 {
        margin-bottom: 20px;
        font-size: 1.8em;
    }

    .movie-details p {
        margin-bottom: 15px;
        line-height: 1.6;
    }

    .play-button {
        padding: 12px 30px;
        background-color: #e50914;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        font-size: 1em;
        font-weight: bold;
        margin-top: 25px;
    }

    .play-button:hover {
        background-color: #c20812;
    }

    .no-results {
        text-align: center;
        padding: 40px;
        font-size: 1.2em;
        color: #aaa;
    }

    .loader {
        text-align: center;
        padding: 40px;
    }

    input {
      background: 0;
      border: 0;
      outline: none;
      width: 100%; 
      font-size: 1.5em;
      transition: padding 0.3s 0.2s ease;
      color: white;
    }

    input:focus {
      padding-bottom: 5px;
    }

    input:focus + .line:after {
      transform: scaleX(1);
    }

    .field {
      position: relative;
      width: 80vw;
      max-width: 400px;
      margin: 0 auto;
    }

    .field .line {
      width: 100%;
      height: 3px;
      position: absolute;
      bottom: -8px;
      background: #bdc3c7;
    }

    .field .line:after {
        content: " ";
        position: absolute;
        width: 100%;
        height: 3px;
        left: 0;
        transform: scaleX(0);
        transform-origin: center;
        transition: transform 0.3s ease;
        background: red;
        z-index: 1;
    }

    .player-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        z-index: 300;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .player-screen.active {
        display: flex;
    }

    .player-close {
        position: absolute;
        top: 20px;
        right: 20px;
        color: white;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }

    .player-close:hover {
        color: #aaa;
    }


    .video-frame {
        width: 90%;
        height: 90%;
        border: 2px solid white;
        border-radius: 5px;
    }

    @media (max-width: 600px) {
        .movie-details {
            flex-direction: column;
        }

        .movie-details img {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
        }
    }
    </style>
</head>
<body>
    <button class="back">back</button>
    <img src="/compass.gif" alt="logo" class="anchor-logo">
    
    <div class="container">
        <h1>movies</h1>

        <div class="field">
            <input id="searchInput" class="search" type="text" placeholder="search...">
            <div class="line"></div>
        </div>

        <div id="moviesContainer" class="movies-grid"></div>
        <div id="noResults" class="no-results" style="display: none;">No movies found</div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="playerScreen" class="player-screen">
        <span class="player-close">&times;</span>
        <iframe id="videoFrame" class="video-frame" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <script>
    const API_KEY = 'fd0954d08e011aebbba749fee1e4a4b5';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

    if (API_KEY === 'TMDB_API_KEY' || !API_KEY) {
        alert('Please set TMDB API key in the code');
    }

    const backButton = document.querySelector('.back');
    const searchInput = document.getElementById('searchInput');
    const moviesContainer = document.getElementById('moviesContainer');
    const noResults = document.getElementById('noResults');
    const movieModal = document.getElementById('movieModal');
    const closeModal = document.querySelector('.close-modal');
    const playerScreen = document.getElementById('playerScreen');
    const playerClose = document.querySelector('.player-close');
    const videoFrame = document.getElementById('videoFrame');
    const urlParams = new URLSearchParams(window.location.search);

    backButton.addEventListener('click', () => {
        window.location.href = '/index.html';
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchMovies();
    });

    closeModal.addEventListener('click', () => {
        movieModal.classList.remove('active');
    });

    movieModal.addEventListener('click', (e) => {
        if (e.target === movieModal) movieModal.classList.remove('active');
    });

    playerClose.addEventListener('click', () => {
        playerScreen.classList.remove('active');
        videoFrame.src = '';
    });

    const initialQuery = urlParams.get('q');
    if (initialQuery) {
        searchInput.value = initialQuery;
        searchMovies();
    }

    async function searchMovies() {
        const query = searchInput.value.trim();
        if (!query) {
            moviesContainer.innerHTML = '';
            noResults.style.display = 'none';
            return;
        }

        moviesContainer.innerHTML = '<div class="loader">Loading...</div>';
        noResults.style.display = 'none';

        try {
            const response = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (!data.results || data.results.length === 0) {
                moviesContainer.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            moviesContainer.innerHTML = '';
            data.results.forEach(movie => {
                const posterPath = movie.poster_path ? IMG_BASE + movie.poster_path : '/placeholder.png';
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${posterPath}" alt="${movie.title}" class="movie-poster">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-year">${new Date(movie.release_date).getFullYear() || 'N/A'}</div>
                `;
                card.addEventListener('click', () => openMovieModal(movie));
                moviesContainer.appendChild(card);
            });
        } catch (error) {
            console.error('Error fetching movies:', error);
            moviesContainer.innerHTML = '<div class="no-results">Error loading movies. Make sure your API key is valid.</div>';
        }
    }

    function openMovieModal(movie) {
        const posterPath = movie.poster_path ? IMG_BASE + movie.poster_path : '/placeholder.png';
        const releaseDate = new Date(movie.release_date).getFullYear() || 'N/A';

        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <h2>${movie.title}</h2>
            <div class="movie-details">
                <img src="${posterPath}" alt="${movie.title}">
                <div class="movie-info">
                    <p><strong>Release Date:</strong> ${releaseDate}</p>
                    <p><strong>Rating:</strong> ${movie.vote_average}/10</p>
                    <p><strong>Overview:</strong> ${movie.overview || 'No overview available'}</p>
                    <button class="play-button" onclick="playMovie(${movie.id})">Play</button>
                </div>
            </div>
        `;
        movieModal.classList.add('active');
    }

    function playMovie(movieId) {
        const vidFastUrl = `https://vidfast.pro/movie/${movieId}?autoPlay=true`;
        videoFrame.src = vidFastUrl;
        playerScreen.classList.add('active');
        movieModal.classList.remove('active');
    }
    </script>
</body>
</html>
