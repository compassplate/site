<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet Proxy | compassplate</title>
    <link rel="icon" type="image/gif" href="/compass.gif">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .navbar {
        background-color: rgba(30, 30, 30, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar-brand {
        font-size: 20px;
        font-weight: 600;
        background: linear-gradient(120deg, #00d4ff, #00ffd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .back-link {
        color: #00d4ff;
        text-decoration: none;
        font-size: 14px;
        padding: 8px 12px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 6px;
        transition: all 0.2s;
    }

    .back-link:hover {
        background-color: rgba(0, 212, 255, 0.1);
        border-color: rgba(0, 212, 255, 0.6);
    }

    .splash-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        opacity: 1;
        transition: opacity 0.5s ease-out;
    }

    .splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .splash-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 30px;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .splash-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 10px;
        text-align: center;
        background: linear-gradient(120deg, #00d4ff, #00ffd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .splash-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 50px;
        text-align: center;
    }

    .status-checklist {
        background-color: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 30px;
        max-width: 400px;
        width: 100%;
    }

    .status-title {
        font-size: 14px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
    }

    .status-item {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding: 12px;
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        border-left: 3px solid rgba(255, 255, 255, 0.2);
    }

    .status-item.pending {
        border-left-color: #ffa500;
    }

    .status-item.success {
        border-left-color: #00ff88;
    }

    .status-item.error {
        border-left-color: #ff4444;
    }

    .status-icon {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        flex-shrink: 0;
    }

    .status-icon.pending::before {
        content: '⟳';
        animation: spin 1s linear infinite;
    }

    .status-icon.success::before {
        content: '✓';
        color: #00ff88;
    }

    .status-icon.error::before {
        content: '✗';
        color: #ff4444;
    }

    .status-text {
        flex: 1;
    }

    .status-label {
        font-size: 14px;
        font-weight: 500;
        color: #fff;
    }

    .status-message {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 2px;
    }

    .proxy-ui {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
    }

    .proxy-ui.visible {
        display: flex;
    }

    .header {
        background-color: rgba(30, 30, 30, 0.5);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
    }

    .nav-buttons {
        display: flex;
        gap: 8px;
    }

    .nav-btn {
        width: 36px;
        height: 36px;
        border: none;
        background-color: rgba(0, 212, 255, 0.1);
        color: #00d4ff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .nav-btn:hover:not(:disabled) {
        background-color: rgba(0, 212, 255, 0.2);
        border-color: rgba(0, 212, 255, 0.5);
    }

    .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    .address-bar {
        flex: 1;
        min-width: 250px;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .url-input {
        flex: 1;
        padding: 8px 12px;
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
        backdrop-filter: blur(10px);
    }

    .url-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus {
        outline: none;
        border-color: #00d4ff;
        background-color: rgba(0, 212, 255, 0.1);
    }

    .go-btn {
        padding: 8px 16px;
        background: linear-gradient(120deg, #00d4ff, #00ffd5);
        border: none;
        color: #000;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
    }

    .go-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
    }

    .content-wrapper {
        flex: 1;
        overflow: hidden;
        padding: 20px;
    }

    .proxy-container {
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .proxy-content {
        flex: 1;
        overflow: auto;
        position: relative;
        background-color: #fff;
    }

    .proxy-frame {
        width: 100%;
        height: 100%;
        border: none;
        background-color: #fff;
    }

    .proxy-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        text-align: center;
        flex-direction: column;
        gap: 16px;
    }

    .proxy-empty-icon {
        font-size: 48px;
        opacity: 0.5;
    }

    .proxy-empty-text {
        font-size: 16px;
    }

    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        border-radius: 8px;
    }

    .loading-spinner {
        font-size: 48px;
        animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @media (max-width: 768px) {
        .splash-logo {
            width: 80px;
            height: 80px;
        }

        .splash-title {
            font-size: 24px;
        }

        .header {
            flex-direction: column;
            align-items: stretch;
        }

        .address-bar {
            width: 100%;
        }

        .status-checklist {
            max-width: 100%;
        }
    }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">compassplate | proxy</div>
        <a href="/index.html" class="back-link">← back</a>
    </div>

    <div class="splash-screen" id="splashScreen">
        <img src="/compass.gif" alt="Loading" class="splash-logo">
        <h1 class="splash-title">Scramjet Proxy</h1>
        <p class="splash-subtitle">Initializing system checks...</p>
        <div class="status-checklist" id="statusContainer"></div>
    </div>

    <div class="proxy-ui" id="proxyUI">
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" title="Back">←</button>
                <button class="nav-btn" id="forwardBtn" title="Forward">→</button>
                <button class="nav-btn" id="reloadBtn" title="Reload">⟳</button>
            </div>
            <div class="address-bar">
                <input type="text" class="url-input" id="urlInput" placeholder="Enter URL to proxy...">
                <button class="go-btn" id="goBtn">GO</button>
            </div>
        </div>
        <div class="content-wrapper">
            <div class="proxy-container">
                <div class="proxy-content" id="proxyContent">
                    <div class="proxy-empty">
                        <div class="proxy-empty-icon">🌐</div>
                        <div class="proxy-empty-text">Enter a URL to proxy</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const statusContainer = document.getElementById('statusContainer');
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const proxyUI = document.getElementById('proxyUI');
    const splashScreen = document.getElementById('splashScreen');
    const navBackBtn = document.getElementById('backBtn');
    const navForwardBtn = document.getElementById('forwardBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const proxyContent = document.getElementById('proxyContent');

    let urlHistory = [];
    let currentHistoryIndex = -1;
    let botCheckPassed = false;
    let checksComplete = false;

    function addStatus(id, label, state, message) {
        let item = document.getElementById(`status-${id}`);
        if (!item) {
            item = document.createElement('div');
            item.id = `status-${id}`;
            item.className = `status-item ${state}`;
            statusContainer.appendChild(item);
        }
        item.className = `status-item ${state}`;
        item.innerHTML = `
            <div class="status-icon ${state}"></div>
            <div class="status-text">
                <div class="status-label">${label}</div>
                ${message ? `<div class="status-message">${message}</div>` : ''}
            </div>
        `;
    }

    async function runInitialChecks() {
        addStatus('check1', 'Scramjet Installed', 'pending', 'Verifying installation...');
        await new Promise(r => setTimeout(r, 800));

        try {
            const response = await fetch('/api/scramjet-status');
            if (response.ok) {
                addStatus('check1', 'Scramjet Installed', 'success', 'v4.36.2');
            } else {
                throw new Error('Not available');
            }
        } catch {
            addStatus('check1', 'Scramjet Installed', 'error', 'Not found');
        }

        addStatus('check2', 'Testing Functionality', 'pending', 'Running diagnostics...');
        await new Promise(r => setTimeout(r, 1000));

        try {
            const response = await fetch('/api/scramjet-test');
            if (response.ok) {
                addStatus('check2', 'Scramjet Active', 'success', 'Fully operational');
            } else {
                throw new Error('Not functional');
            }
        } catch {
            addStatus('check2', 'Scramjet Active', 'error', 'Not responding');
        }

        addStatus('check3', 'Verifying User', 'pending', 'Checking credentials...');
        await new Promise(r => setTimeout(r, 600));

        const headers = new Headers();
        headers.append('User-Agent', navigator.userAgent);
        headers.append('Accept-Language', navigator.language);

        try {
            const response = await fetch('/api/verify-user', { headers });
            if (response.ok) {
                botCheckPassed = true;
                addStatus('check3', 'User Verified', 'success', 'Real user detected');
            } else {
                throw new Error('Verification failed');
            }
        } catch {
            addStatus('check3', 'User Verified', 'error', 'Could not verify');
        }

        if (!botCheckPassed) {
            addStatus('check4', 'Proxy Ready', 'error', 'User verification failed');
            goBtn.disabled = true;
            checksComplete = true;
            return;
        }

        addStatus('check4', 'Proxy Ready', 'success', 'System initialized');
        checksComplete = true;

        await new Promise(r => setTimeout(r, 1000));
        transitionToProxyUI();
    }

    function transitionToProxyUI() {
        splashScreen.classList.add('hidden');
        setTimeout(() => {
            proxyUI.classList.add('visible');
        }, 500);
    }

    async function proxyUrl(url) {
        if (!botCheckPassed) {
            alert('User verification failed. Please refresh the page.');
            return;
        }

        if (!url.match(/^https?:\/\//i)) {
            url = 'https://' + url;
        }

        urlInput.value = url;

        const loadingOverlay = document.createElement('div');
        loadingOverlay.className = 'loading-overlay';
        loadingOverlay.innerHTML = '<div class="loading-spinner">⟳</div>';
        proxyContent.style.position = 'relative';
        proxyContent.appendChild(loadingOverlay);

        try {
            const response = await fetch('/api/proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();

            proxyContent.innerHTML = '';

            if (data.type === 'html') {
                const iframe = document.createElement('iframe');
                iframe.className = 'proxy-frame';
                iframe.srcdoc = data.content;
                proxyContent.appendChild(iframe);
            } else if (data.type === 'text') {
                const pre = document.createElement('pre');
                pre.style.cssText = 'padding: 20px; white-space: pre-wrap; word-wrap: break-word; color: #333; background: #fff; height: 100%; overflow: auto;';
                pre.textContent = data.content;
                proxyContent.appendChild(pre);
            }

            urlHistory.push(url);
            currentHistoryIndex = urlHistory.length - 1;
            updateNavButtons();

        } catch (error) {
            proxyContent.innerHTML = `
                <div class="proxy-empty">
                    <div class="proxy-empty-icon">❌</div>
                    <div class="proxy-empty-text">Error: ${error.message}</div>
                </div>
            `;
        }
    }

    function updateNavButtons() {
        navBackBtn.disabled = currentHistoryIndex <= 0;
        navForwardBtn.disabled = currentHistoryIndex >= urlHistory.length - 1;
    }

    goBtn.addEventListener('click', () => {
        const url = urlInput.value.trim();
        if (url) proxyUrl(url);
    });

    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const url = urlInput.value.trim();
            if (url) proxyUrl(url);
        }
    });

    navBackBtn.addEventListener('click', () => {
        if (currentHistoryIndex > 0) {
            currentHistoryIndex--;
            urlInput.value = urlHistory[currentHistoryIndex];
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });

    navForwardBtn.addEventListener('click', () => {
        if (currentHistoryIndex < urlHistory.length - 1) {
            currentHistoryIndex++;
            urlInput.value = urlHistory[currentHistoryIndex];
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });

    reloadBtn.addEventListener('click', () => {
        if (currentHistoryIndex >= 0) {
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });

    runInitialChecks();
    </script>
</body>
</html>
